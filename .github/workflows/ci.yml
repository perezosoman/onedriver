name: Run tests
on: push
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/perezosoman/onedriver-ci:latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        account_type:
          - personal
          - business
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Check go formatting
        run: |
          goimports -l .

      - name: Setup dummy auth tokens for CI without AWS
        run: |
          # Always create dummy tokens first - will be overwritten if S3 succeeds
          echo '{}' > .auth_tokens.json

      - name: Use credentials from GitHub Secret (if set)
        run: |
          cat << 'EOF' > .auth_tokens.json
          ${{ secrets.ONEDRIVER_AUTH_TOKENS }}
          EOF
          if [ -s .auth_tokens.json ] && ! grep -q '^{}$' .auth_tokens.json; then
            echo "✅ Loaded OneDrive credentials from GitHub Secret"
          fi

      - name: Copy auth tokens from S3 (upstream only)
        if: success()
        # Only attempt S3 if credentials weren't loaded from GitHub Secret
        run: |
          if grep -q '^{}$' .auth_tokens.json; then
            which aws || echo "AWS CLI not required"
            aws --version || echo "AWS CLI not required"
            aws s3 cp s3://fusefs-travis/$ACCOUNT_TYPE/.auth_tokens.json . || echo "⚠️  Could not download from S3 (expected without AWS credentials)"
            aws s3 cp s3://fusefs-travis/dmel.fa.gz . || echo "⚠️  Could not download dmel.fa from S3"
            gunzip dmel.fa.gz 2>/dev/null || true
          else
            echo "Skipping S3 — credentials already loaded from GitHub Secret"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_TYPE: ${{ matrix.account_type }}
        continue-on-error: true

      - name: Download test data from public FTP if needed
        run: |
          # Download dmel.fa from public source if S3 download failed
          if [ ! -f dmel.fa ]; then
            echo "📥 Downloading dmel.fa from public FTP..."
            curl -L ftp://ftp.ensemblgenomes.org/pub/metazoa/release-42/fasta/drosophila_melanogaster/dna/Drosophila_melanogaster.BDGP6.22.dna.chromosome.X.fa.gz | gunzip > dmel.fa || echo "Failed to download dmel.fa"
          fi

      - name: Setup mock fallback if no valid auth tokens
        run: |
          # Enable ONEDRIVER_MOCK=1 whenever the access token is missing or
          # stale, so setup_test.go's CI block never refreshes against the
          # real Microsoft endpoint (a failed refresh cascades into an OAuth
          # URL prompt that hangs the test binary).
          # Second-line defence: fs/graph/oauth2.go::Refresh refuses to call
          # newAuth in CI/MOCK if a stale token ever slips past this check.
          USE_MOCK=0
          REASON=""

          if [ ! -s .auth_tokens.json ] || grep -q '^{}$' .auth_tokens.json; then
            USE_MOCK=1
            REASON=".auth_tokens.json is empty or a {} placeholder"
          elif command -v jq >/dev/null 2>&1; then
            expires_at=$(jq -r '.expires_at // null' .auth_tokens.json 2>/dev/null)
            # Validate expires_at carefully: it must be a JSON integer for
            # bash arithmetic to work. String-typed or malformed values would
            # otherwise produce "integer expression expected" and silently fall
            # through to the "real credentials" branch.
            case "$expires_at" in
              null|"")
                USE_MOCK=1
                REASON="no expires_at field found (not an onedriver auth file)"
                ;;
              *)
                if ! [[ "$expires_at" =~ ^[0-9]+$ ]]; then
                  USE_MOCK=1
                  REASON="expires_at is not an integer ($expires_at)"
                else
                  now=$(date +%s)
                  if [ "$expires_at" -lt "$now" ]; then
                    USE_MOCK=1
                    REASON="access token expired (expires_at=$expires_at < now=$now)"
                  else
                    expiry_iso=$(date -u -d "@$expires_at" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "$expires_at")
                    REASON="real credentials (valid until $expiry_iso)"
                  fi
                fi
                ;;
            esac
          else
            # jq not installed — fall back to the legacy length-based check.
            # This is safe: fs/graph/oauth2.go::Refresh refuses to call
            # newAuth() in CI/MOCK, so a stale-token refresh will at worst
            # log a warning and let tests skip cleanly.
            REASON="jq unavailable; using legacy length-based check"
          fi

          if [ "$USE_MOCK" = "1" ]; then
            echo "ONEDRIVER_MOCK=1" >> $GITHUB_ENV
            # Generate a smaller dummy dmel.fa for mock mode (1 MB)
            dd if=/dev/urandom of=dmel.fa bs=1024 count=1024 2>/dev/null
            echo "⚠️  Falling back to mock Graph API: $REASON"
          else
            echo "✅ $REASON"
          fi

      - name: Run tests
        run: |
          # cannot run systemd tests here because github actions runners don't have dbus setup +
          # if CGO is on, the UI tests will take foreverrrrr
          bash cgo-helper.sh
          echo "Running test ui with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          CGO_ENABLED=0 ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./ui/... -coverprofile=ui.coverage ./ui
          echo " ################################################# "
          echo "Running test common with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./cmd/common -coverprofile=common.coverage ./cmd/common
          echo " ################################################# "
          echo "Running test quickxorhash with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          
          ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=quickxorhash.coverage ./fs/graph/quickxorhash
          
          echo " ################################################# "
          echo "Running test graph with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"

          CGO_ENABLED=0 ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=graph.coverage ./fs/graph
          echo " ################################################# "
          if [ "${ONEDRIVER_MOCK:-}" != "1" ]; then
            echo "Running test fs/ with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
            gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=fs.coverage ./fs
            go test -c -tags=glib_2_64 -covermode=count -coverpkg=./fs/... ./fs/offline
            sudo unshare -n -S $(id -u) -G $(id -g) ./offline.test -test.v -test.coverprofile=offline.coverage
          else
            echo "Skipping fs/ tests (mock mode — FUSE mount not available)"
            echo 'mode: set' > fs.coverage
            echo 'mode: set' > offline.coverage
          fi
          echo " ################################################# "
          echo "End of tests. Combining coverage profiles..."
      
      - name: Copy new auth tokens to S3
        # This step will fail gracefully if AWS credentials are not available
        if: always()
        run: |
          aws s3 cp .auth_tokens.json s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload to S3 (expected without AWS credentials)"
          aws s3 cp fusefs_tests.log s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload logs to S3"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_TYPE: ${{ matrix.account_type }}
        continue-on-error: true


      - name: Combine test coverage into single file
        run: |
          gocovmerge *.coverage > coverage.out
        if: always()

      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@v1.2.0
        if: always()

      - name: Send test coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
          flag-name: ${{ matrix.account_type }}
          parallel: true
        # decreased coverage isn't a failure
        continue-on-error: true
        if: always()
  finish:
    name: Complete Coveralls run
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
        # decreased coverage isn't a failure
        continue-on-error: true
