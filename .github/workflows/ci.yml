name: Run tests
on: push
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/perezosoman/onedriver-ci:latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        account_type:
          - personal
          - business
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Check go formatting
        run: |
          goimports -l .

      # Upfront auth validation: replace the previous chain of "write dummy →
      # overwrite with secret → try S3 → try FTP → fall back to mock with jq
      # check". This single step reads the ONEDRIVER_AUTH_TOKENS secret, does
      # a fast-path expires_at check, attempts an OAuth refresh when the token
      # is expired but a refresh_token is present, then validates the
      # access_token against Microsoft Graph /v1.0/me. If any of those checks
      # fail, it writes an empty tokens file, sets ONEDRIVER_MOCK=1, and
      # generates a dummy dmel.fa so subsequent tests run in mock mode.
      - name: Validate ONEDRIVER_AUTH_TOKENS upfront (with optional refresh)
        id: validate-auth
        run: |
          set +e

          AUTH_VALID="false"
          AUTH_REASON="ONEDRIVER_AUTH_TOKENS secret is not set"
          AUTH_USER=""

          # Defaults from fs/graph/oauth2.go — used when the secret does not
          # carry its own config block.
          DEFAULT_CLIENT_ID="3470c3fa-bc10-45ab-a0a9-2d30836485d1"
          DEFAULT_TOKEN_URL="https://login.microsoftonline.com/common/oauth2/v2.0/token"
          DEFAULT_REDIRECT_URL="https://login.live.com/oauth20_desktop.srf"

          if [ -n "$ONEDRIVER_AUTH_TOKENS" ]; then
            ACCESS_TOKEN=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r '.access_token // empty' 2>/dev/null)
            EXPIRES_AT=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r '.expires_at // 0' 2>/dev/null)
            REFRESH_TOKEN=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r '.refresh_token // empty' 2>/dev/null)
            CLIENT_ID=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r --arg d "$DEFAULT_CLIENT_ID" '.config.clientID // $d' 2>/dev/null)
            REDIRECT_URL=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r --arg d "$DEFAULT_REDIRECT_URL" '.config.redirectURL // $d' 2>/dev/null)
            TOKEN_URL=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r --arg d "$DEFAULT_TOKEN_URL" '.config.tokenURL // $d' 2>/dev/null)
            ACCOUNT=$(printf '%s' "$ONEDRIVER_AUTH_TOKENS" | jq -r '.account // empty' 2>/dev/null)
            NOW=$(date +%s 2>/dev/null || echo 0)

            if [ -z "$ACCESS_TOKEN" ]; then
              AUTH_REASON="secret is set but has no access_token field"
            elif ! [[ "$EXPIRES_AT" =~ ^[0-9]+$ ]]; then
              AUTH_REASON="expires_at is not a valid integer (got: '$EXPIRES_AT')"
            elif [ "$EXPIRES_AT" -gt 0 ] && [ "$EXPIRES_AT" -lt "$NOW" ]; then
              # Token expired — try refresh.
              EXPIRY_ISO=$(date -u -d "@$EXPIRES_AT" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "$EXPIRES_AT")
              if [ -n "$REFRESH_TOKEN" ]; then
                echo "::group::Refreshing expired token (expired at $EXPIRY_ISO)"
                # Build the OAuth refresh form body via jq so the secret
                # values are URL-encoded without ever being expanded by the
                # shell. This avoids shell injection if the secret contains
                # `$`, backticks, or `$(...)`.
                FORM_BODY=$(jq -nr \
                  --arg ci "$CLIENT_ID" \
                  --arg ru "$REDIRECT_URL" \
                  --arg rt "$REFRESH_TOKEN" \
                  '"client_id=" + ($ci | @uri) + "&redirect_uri=" + ($ru | @uri) + "&refresh_token=" + ($rt | @uri) + "&grant_type=refresh_token"')
                REFRESH_RESP=$(curl -sS --max-time 15 \
                  -X POST \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  --data "$FORM_BODY" \
                  "$TOKEN_URL" 2>/dev/null)
                NEW_ACCESS=$(printf '%s' "$REFRESH_RESP" | jq -r '.access_token // empty' 2>/dev/null)
                NEW_EXPIRES_IN=$(printf '%s' "$REFRESH_RESP" | jq -r '.expires_in // 0' 2>/dev/null)
                NEW_REFRESH=$(printf '%s' "$REFRESH_RESP" | jq -r '.refresh_token // empty' 2>/dev/null)
                [ -z "$NEW_REFRESH" ] && NEW_REFRESH="$REFRESH_TOKEN"
                if [ -n "$NEW_ACCESS" ] && [[ "$NEW_EXPIRES_IN" =~ ^[0-9]+$ ]]; then
                  NEW_EXPIRES_AT=$((NOW + NEW_EXPIRES_IN))
                  jq -n \
                    --arg at "$NEW_ACCESS" \
                    --arg rt "$NEW_REFRESH" \
                    --argjson ea "$NEW_EXPIRES_AT" \
                    --argjson ei "$NEW_EXPIRES_IN" \
                    --arg ci "$CLIENT_ID" \
                    --arg tu "$TOKEN_URL" \
                    --arg ru "$REDIRECT_URL" \
                    --arg acct "$ACCOUNT" \
                    '{access_token: $at, refresh_token: $rt, expires_at: $ea, expires_in: $ei, account: $acct, config: {clientID: $ci, tokenURL: $tu, redirectURL: $ru}}' \
                    > .auth_tokens.json
                  AUTH_VALID="true"
                  NEW_EXPIRY_ISO=$(date -u -d "@$NEW_EXPIRES_AT" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "$NEW_EXPIRES_AT")
                  # NOTE: GitHub Secrets cannot be written from a workflow, so
                  # the refreshed tokens are written to .auth_tokens.json (and
                  # uploaded to S3 by the "Copy new auth tokens to S3" step in
                  # real-auth mode). The next CI run will still see the OLD
                  # refresh_token in the secret and fail its own refresh
                  # attempt — the user must periodically re-export the
                  # refreshed payload into the GitHub Secret (or pull from S3).
                  AUTH_REASON="refreshed via OAuth (valid until $NEW_EXPIRY_ISO) ⚠️  re-export to ONEDRIVER_AUTH_TOKENS secret before next run"
                  # NOTE: GitHub Secrets cannot be written from a workflow, so
                  # the refreshed tokens are written to .auth_tokens.json (and
                  # uploaded to S3 by the "Copy new auth tokens to S3" step in
                  # real-auth mode). The next CI run will still see the OLD
                  # refresh_token in the secret and fail its own refresh
                  # attempt. Recovery: pull the refreshed payload back into
                  # the secret, e.g.:
                  #   aws s3 cp s3://fusefs-travis/personal/.auth_tokens.json ./refreshed.json
                  # then paste ./refreshed.json into the ONEDRIVER_AUTH_TOKENS
                  # GitHub Secret.
                else
                  ERR_CODE=$(printf '%s' "$REFRESH_RESP" | jq -r '.error // "unknown"' 2>/dev/null)
                  ERR_DESC=$(printf '%s' "$REFRESH_RESP" | jq -r '.error_description // ""' 2>/dev/null)
                  AUTH_REASON="token expired at $EXPIRY_ISO; refresh failed ($ERR_CODE: $ERR_DESC)"
                fi
                echo "::endgroup::"
              else
                AUTH_REASON="token expired at $EXPIRY_ISO; no refresh_token in secret"
              fi
            else
              # Token not expired — do a live API check.
              EXPIRY_ISO=$(date -u -d "@$EXPIRES_AT" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "$EXPIRES_AT")
              HTTP_CODE=$(curl -sS -o /tmp/auth-check.json -w "%{http_code}" \
                --max-time 10 \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Accept: application/json" \
                "https://graph.microsoft.com/v1.0/me" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                printf '%s\n' "$ONEDRIVER_AUTH_TOKENS" > .auth_tokens.json
                AUTH_VALID="true"
                AUTH_USER=$(jq -r '.userPrincipalName // .displayName // .id // "unknown"' /tmp/auth-check.json 2>/dev/null)
                AUTH_REASON="validated against Microsoft Graph (user: $AUTH_USER, valid until $EXPIRY_ISO)"
              else
                ERR_CODE=$(jq -r '.error.code // "unknown"' /tmp/auth-check.json 2>/dev/null)
                ERR_DESC=$(jq -r '.error.message // ""' /tmp/auth-check.json 2>/dev/null)
                [ "$HTTP_CODE" = "000" ] && ERR_DESC="network error or timeout"
                AUTH_REASON="Microsoft Graph rejected token (HTTP $HTTP_CODE) — $ERR_CODE: $ERR_DESC"
              fi
            fi
          fi

          # Mock fallback when not valid.
          if [ "$AUTH_VALID" != "true" ]; then
            printf '%s\n' '{}' > .auth_tokens.json
            echo "ONEDRIVER_MOCK=1" >> "$GITHUB_ENV"
            # 1 MB dummy dmel.fa so ./fs tests that need a file find one.
            dd if=/dev/urandom of=dmel.fa bs=1024 count=1024 2>/dev/null
          fi

          # Sanitize outputs (no token leakage in CI logs).
          AUTH_REASON_SAFE=$(printf '%s' "$AUTH_REASON" | tr '\n' ' ' | head -c 250)
          AUTH_USER_SAFE=$(printf '%s' "$AUTH_USER" | tr '\n' ' ' | head -c 100)
          {
            echo "auth_valid=$AUTH_VALID"
            echo "auth_reason<<EOF_REASON"
            echo "$AUTH_REASON_SAFE"
            echo "EOF_REASON"
            echo "auth_user=$AUTH_USER_SAFE"
          } >> "$GITHUB_OUTPUT"

          if [ "$AUTH_VALID" = "true" ]; then
            echo "✅ ONEDRIVER_AUTH_TOKENS validation passed"
            echo "   $AUTH_REASON"
          else
            echo "⚠️  ONEDRIVER_AUTH_TOKENS invalid — falling back to mock Graph API"
            echo "   $AUTH_REASON"
          fi
        env:
          ONEDRIVER_AUTH_TOKENS: ${{ secrets.ONEDRIVER_AUTH_TOKENS }}

      # Real-auth integration tests (TestUploadSessionLargeFS and friends)
      # need a real Drosophila melanogaster reference FASTA. In mock mode the
      # validate-auth step already produced a 1 MB dummy dmel.fa, so we
      # only fetch the real file when validation passed.
      - name: Fetch real dmel.fa for real-auth integration tests
        if: steps.validate-auth.outputs.auth_valid == 'true'
        run: |
          SKIP_FTP=""
          if command -v aws >/dev/null 2>&1; then
            if aws s3 cp s3://fusefs-travis/dmel.fa.gz . 2>/dev/null && [ -s dmel.fa.gz ]; then
              echo "✅ Downloaded dmel.fa from S3"
              gunzip -f dmel.fa.gz
              SKIP_FTP=1
            fi
          else
            echo "ℹ️  aws CLI not in PATH, skipping S3 attempt"
          fi
          if [ -z "$SKIP_FTP" ]; then
            echo "📥 Downloading dmel.fa from public FTP..."
            curl -L --max-time 60 \
              ftp://ftp.ensemblgenomes.org/pub/metazoa/release-42/fasta/drosophila_melanogaster/dna/Drosophila_melanogaster.BDGP6.22.dna.chromosome.X.fa.gz \
              | gunzip > dmel.fa || echo "⚠️  Failed to download dmel.fa; TestUploadSessionLargeFS will skip"
          fi
          if [ ! -s dmel.fa ]; then
            echo "⚠️  No dmel.fa available — large-file integration tests will skip"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Run tests
        run: |
          # cannot run systemd tests here because github actions runners don't have dbus setup +
          # if CGO is on, the UI tests will take foreverrrrr
          bash cgo-helper.sh
          echo "Running test ui with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          CGO_ENABLED=0 ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./ui/... -coverprofile=ui.coverage ./ui
          echo " ################################################# "
          echo "Running test common with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./cmd/common -coverprofile=common.coverage ./cmd/common
          echo " ################################################# "
          echo "Running test quickxorhash with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"

          ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=quickxorhash.coverage ./fs/graph/quickxorhash

          echo " ################################################# "
          echo "Running test graph with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"

          CGO_ENABLED=0 ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=graph.coverage ./fs/graph
          echo " ################################################# "
          if [ "${ONEDRIVER_MOCK:-}" != "1" ]; then
            echo "Running test fs/ with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
            gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=fs.coverage ./fs
            go test -c -tags=glib_2_64 -covermode=count -coverpkg=./fs/... ./fs/offline
            sudo unshare -n -S $(id -u) -G $(id -g) ./offline.test -test.v -test.coverprofile=offline.coverage
          else
            echo "Skipping fs/ tests (mock mode — FUSE mount not available)"
            echo 'mode: set' > fs.coverage
            echo 'mode: set' > offline.coverage
          fi
          echo " ################################################# "
          echo "End of tests. Combining coverage profiles..."

      # Only share real-auth tokens back to S3; in mock mode the file is `{}`
      # and there's nothing useful to upload.
      - name: Copy new auth tokens to S3 (real-auth runs only)
        if: always() && env.ONEDRIVER_MOCK != '1'
        run: |
          aws s3 cp .auth_tokens.json s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload to S3 (expected without AWS credentials)"
          aws s3 cp fusefs_tests.log s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload logs to S3"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_TYPE: ${{ matrix.account_type }}
        continue-on-error: true

      - name: Combine test coverage into single file
        run: |
          gocovmerge *.coverage > coverage.out
        if: always()

      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@v1.2.0
        if: always()

      - name: Send test coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
          flag-name: ${{ matrix.account_type }}
          parallel: true
        # decreased coverage isn't a failure
        continue-on-error: true
        # Only report coverage when the run actually exercised real auth + FUSE
        # tests. In ONEDRIVER_MOCK=1 mode (no real OneDrive credentials, which
        # is the default for forks without the secret set) the ./fs/ and
        # ./fs/offline/ tests are skipped and replaced with empty coverage
        # files, which would otherwise inflate the delta against main and
        # produce misleading -16.6% style drops in PR reviews. We AND with
        # always() so coverage still gets reported if earlier steps (tests,
        # lcov convert) failed in real-auth mode.
        if: always() && env.ONEDRIVER_MOCK != '1'
  finish:
    name: Complete Coveralls run
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
        # decreased coverage isn't a failure
        continue-on-error: true
