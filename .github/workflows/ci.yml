name: Run tests
on: push
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        account_type:
          - personal
          - business
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install apt dependencies
        run: |
          sudo apt update
          sudo apt install \
            gcc \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libjson-glib-dev \
            make \
            wget \
            rpm \
            libreoffice

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Check go formatting
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          goimports -l .

      - name: Setup dummy auth tokens for CI without AWS
        run: |
          # Always create dummy tokens first - will be overwritten if S3 succeeds
          echo '{}' > .auth_tokens.json

      - name: Copy auth tokens from S3
        # This step will fail gracefully if AWS credentials are not available
        run: |
          which aws || echo "AWS CLI not required"
          aws --version || echo "AWS CLI not required"
          aws s3 cp s3://fusefs-travis/$ACCOUNT_TYPE/.auth_tokens.json . || echo "⚠️  Could not download from S3 (expected without AWS credentials)"
          aws s3 cp s3://fusefs-travis/dmel.fa.gz . || echo "⚠️  Could not download dmel.fa from S3"
          gunzip dmel.fa.gz 2>/dev/null || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_TYPE: ${{ matrix.account_type }}
        continue-on-error: true

      - name: Download test data from public FTP if needed
        run: |
          # Download dmel.fa from public source if S3 download failed
          if [ ! -f dmel.fa ]; then
            echo "📥 Downloading dmel.fa from public FTP..."
            curl -L ftp://ftp.ensemblgenomes.org/pub/metazoa/release-42/fasta/drosophila_melanogaster/dna/Drosophila_melanogaster.BDGP6.22.dna.chromosome.X.fa.gz | gunzip > dmel.fa || echo "Failed to download dmel.fa"
          fi

      - name: Run tests
        run: |
          go install github.com/rakyll/gotest@latest
          # cannot run systemd tests here because github actions runners don't have dbus setup +
          # if CGO is on, the UI tests will take foreverrrrr
          bash cgo-helper.sh
          CGO_ENABLED=0 gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./ui/... -coverprofile=ui.coverage ./ui
          gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./cmd/common -coverprofile=common.coverage ./cmd/common
          gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=quickxorhash.coverage ./fs/graph/quickxorhash
          gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=graph.coverage ./fs/graph
          gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=fs.coverage ./fs
          go test -c -tags=glib_2_64 -covermode=count -coverpkg=./fs/... ./fs/offline
          sudo unshare -n -S $(id -u) -G $(id -g) ./offline.test -test.v -test.coverprofile=offline.coverage

      - name: Copy new auth tokens to S3
        # This step will fail gracefully if AWS credentials are not available
        if: always()
        run: |
          aws s3 cp .auth_tokens.json s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload to S3 (expected without AWS credentials)"
          aws s3 cp fusefs_tests.log s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload logs to S3"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_TYPE: ${{ matrix.account_type }}
        continue-on-error: true

      - name: Combine test coverage into single file
        run: |
          go install github.com/wadey/gocovmerge@latest
          gocovmerge *.coverage > coverage.out
        if: always()

      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@v1.2.0
        if: always()

      - name: Send test coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
          flag-name: ${{ matrix.account_type }}
          parallel: true
        # decreased coverage isn't a failure
        continue-on-error: true
        if: always()
  finish:
    name: Complete Coveralls run
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
        # decreased coverage isn't a failure
        continue-on-error: true
