name: Run tests
on: push
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/perezosoman/onedriver-ci:latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        account_type:
          - personal
          - business
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Check go formatting
        run: |
          goimports -l .

      # Run the bash script's Go test suite. This catches regressions in
      # scripts/validate-auth.sh (the auth-validation flow) before it gets
      # exercised by the real test binaries below. Failures here abort the
      # whole job, since a broken auth check would mask real test results.
      - name: Run scripts/ unit tests
        run: |
          echo "Running scripts/validateauth tests (auth validation, refresh, /me, shell injection)"
          go test -v -count=1 ./scripts/...

      # Upfront auth validation. Logic lives in scripts/validate-auth.sh
      # so it can be unit-tested locally (see scripts/validateauth/...).
      # Behaviour summary (in order):
      #  1. fast-path expires_at check on the secret;
      #  2. if expired + refresh_token present → POST to token endpoint,
      #     rewrite .auth_tokens.json with refreshed payload;
      #  3. if not expired → live GET microsoft.graph /v1.0/me with Bearer;
      #  4. on any failure → write {}, set ONEDRIVER_MOCK=1, generate
      #     dummy 1 MB dmel.fa so subsequent /fs tests run in mock mode.
      # Outputs auth_valid / auth_reason / auth_user to $GITHUB_OUTPUT for
      # the conditional dmel.fa fetch and Coveralls gating downstream.
      - name: Validate ONEDRIVER_AUTH_TOKENS upfront (with optional refresh)
        id: validate-auth
        run: bash scripts/validate-auth.sh
        env:
          ONEDRIVER_AUTH_TOKENS: ${{ secrets.ONEDRIVER_AUTH_TOKENS }}

      # Real-auth integration tests (TestUploadSessionLargeFS and friends)
      # need a real Drosophila melanogaster reference FASTA. In mock mode the
      # validate-auth step already produced a 1 MB dummy dmel.fa, so we
      # only fetch the real file when validation passed.
      - name: Fetch real dmel.fa for real-auth integration tests
        if: steps.validate-auth.outputs.auth_valid == 'true'
        run: |
          SKIP_FTP=""
          if command -v aws >/dev/null 2>&1; then
            if aws s3 cp s3://fusefs-travis/dmel.fa.gz . 2>/dev/null && [ -s dmel.fa.gz ]; then
              echo "✅ Downloaded dmel.fa from S3"
              gunzip -f dmel.fa.gz
              SKIP_FTP=1
            fi
          else
            echo "ℹ️  aws CLI not in PATH, skipping S3 attempt"
          fi
          if [ -z "$SKIP_FTP" ]; then
            echo "📥 Downloading dmel.fa from public FTP..."
            curl -L --max-time 60 \
              ftp://ftp.ensemblgenomes.org/pub/metazoa/release-42/fasta/drosophila_melanogaster/dna/Drosophila_melanogaster.BDGP6.22.dna.chromosome.X.fa.gz \
              | gunzip > dmel.fa || echo "⚠️  Failed to download dmel.fa; TestUploadSessionLargeFS will skip"
          fi
          if [ ! -s dmel.fa ]; then
            echo "⚠️  No dmel.fa available — large-file integration tests will skip"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Run tests
        run: |
          # cannot run systemd tests here because github actions runners don't have dbus setup +
          # if CGO is on, the UI tests will take foreverrrrr
          bash cgo-helper.sh
          echo "Running test ui with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          CGO_ENABLED=0 ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./ui/... -coverprofile=ui.coverage ./ui
          echo " ################################################# "
          echo "Running test common with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
          ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./cmd/common -coverprofile=common.coverage ./cmd/common
          echo " ################################################# "
          echo "Running test quickxorhash with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"

          ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=quickxorhash.coverage ./fs/graph/quickxorhash

          echo " ################################################# "
          echo "Running test graph with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"

          CGO_ENABLED=0 ONEDRIVER_MOCK="${ONEDRIVER_MOCK:-}" gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=graph.coverage ./fs/graph
          echo " ################################################# "
          if [ "${ONEDRIVER_MOCK:-}" != "1" ]; then
            # In real-auth mode we still need a usable FUSE setup to actually
            # mount ./fs. The runner image ships without fuse3 / fusermount3
            # (see .github/workflows/runner.Dockerfile), so even though
            # fuse.NewServer succeeds (it just opens /dev/fuse), the actual
            # mount later in TestMain fails silently and the fs/ test binary
            # exits with status 1. Detect FUSE usability here and skip the
            # whole fs/ block when it's not available, writing placeholder
            # coverage so downstream gocovmerge / Coveralls steps don't fail.
            if [ -e /dev/fuse ] && command -v fusermount3 >/dev/null 2>&1; then
              echo "Running test fs/ with CGO_ENABLED=0 and ONEDRIVER_MOCK=${ONEDRIVER_MOCK:-}"
              gotest -v -tags=glib_2_64 -covermode=count -coverpkg=./fs/... -coverprofile=fs.coverage ./fs
              go test -c -tags=glib_2_64 -covermode=count -coverpkg=./fs/... ./fs/offline
              sudo unshare -n -S $(id -u) -G $(id -g) ./offline.test -test.v -test.coverprofile=offline.coverage
            else
              echo "⚠️  Skipping fs/ tests — FUSE not usable in this container (need /dev/fuse AND fusermount3)"
              echo "    Fix by either: (a) adding fuse3 to .github/workflows/runner.Dockerfile and rebuilding the image,"
              echo "    or (b) configuring the container with options: --device /dev/fuse --cap-add SYS_ADMIN."
              echo 'mode: set' > fs.coverage
              echo 'mode: set' > offline.coverage
            fi
          else
            echo "Skipping fs/ tests (mock mode — FUSE mount not available)"
            echo 'mode: set' > fs.coverage
            echo 'mode: set' > offline.coverage
          fi
          echo " ################################################# "
          echo "End of tests. Combining coverage profiles..."

      # Only share real-auth tokens back to S3; in mock mode the file is `{}`
      # and there's nothing useful to upload.
      - name: Copy new auth tokens to S3 (real-auth runs only)
        if: always() && env.ONEDRIVER_MOCK != '1'
        run: |
          aws s3 cp .auth_tokens.json s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload to S3 (expected without AWS credentials)"
          aws s3 cp fusefs_tests.log s3://fusefs-travis/$ACCOUNT_TYPE/ || echo "⚠️  Could not upload logs to S3"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ACCOUNT_TYPE: ${{ matrix.account_type }}
        continue-on-error: true

      - name: Combine test coverage into single file
        run: |
          gocovmerge *.coverage > coverage.out
        if: always()

      - name: Convert coverage to lcov
        uses: jandelgado/gcov2lcov-action@v1.2.0
        if: always()

      - name: Send test coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
          flag-name: ${{ matrix.account_type }}
          parallel: true
        # decreased coverage isn't a failure
        continue-on-error: true
        # Only report coverage when the run actually exercised real auth + FUSE
        # tests. In ONEDRIVER_MOCK=1 mode (no real OneDrive credentials, which
        # is the default for forks without the secret set) the ./fs/ and
        # ./fs/offline/ tests are skipped and replaced with empty coverage
        # files, which would otherwise inflate the delta against main and
        # produce misleading -16.6% style drops in PR reviews. We AND with
        # always() so coverage still gets reported if earlier steps (tests,
        # lcov convert) failed in real-auth mode.
        if: always() && env.ONEDRIVER_MOCK != '1'
  finish:
    name: Complete Coveralls run
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
        # decreased coverage isn't a failure
        continue-on-error: true
